site_name: uk_baseline data catalogue
site_description: A guide to every layer in the uk_baseline database.
copyright: Developed by the Digital Innovation team, Prior + Partners — last updated 22 June 2026
theme:
  name: material
  palette:
    primary: deep orange
    accent: deep orange
  features:
    - navigation.instant
    - navigation.tracking
    - toc.integrate
    - search.highlight
    - search.suggest
    - content.code.copy
plugins:
  - search
markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
extra_css:
  - stylesheets/extra.css
