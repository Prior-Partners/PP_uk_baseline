site_name: uk_baseline data catalogue
site_description: Plain-English guide to every layer in the uk_baseline database.
theme:
  name: material
  palette:
    primary: deep orange
    accent: deep orange
  features:
    - navigation.instant
    - navigation.tracking
    - search.highlight
    - search.suggest
    - content.code.copy
plugins:
  - search
markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
extra_css:
  - stylesheets/extra.css
